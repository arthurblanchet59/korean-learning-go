services:
  postgres:
    image: postgres:16-alpine
    container_name: korean-learning-postgres
    environment:
      POSTGRES_DB: korean_learning
      POSTGRES_USER: korean
      POSTGRES_PASSWORD: korean
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U korean -d korean_learning"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: korean-learning-backend
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://korean:korean@postgres:5432/korean_learning?sslmode=disable"
      DB_AUTO_MIGRATE: "true"
      DB_SEED: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: "/api"
    container_name: korean-learning-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres-data:
