services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: korean-learning-backend
    environment:
      HTTP_ADDR: ":8080"
      SQLITE_PATH: "/app/data/korean-learning.db"
      LOG_DIR: "/app/logs"
      DB_SEED: "true"
      JWT_SECRET: "dev-secret-change-me"
      ADMIN_NAME: "Admin"
      ADMIN_EMAIL: "admin@korean.local"
      ADMIN_PASSWORD: "admin123"
    ports:
      - "8080:8080"
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: "/api"
    container_name: korean-learning-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  backend-data:
  backend-logs:
