version: 2

project_name: korean-tui

builds:
  - id: tui
    dir: apps/tui
    main: .
    binary: korean-tui
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X github.com/arthurblanchet59/korean-learning-go/apps/tui/internal/app.version={{ .Version }}
      - -X github.com/arthurblanchet59/korean-learning-go/apps/tui/internal/app.defaultAPIURL=https://korean-learning-app-awe6anaeegavazcs.francecentral-01.azurewebsites.net

archives:
  - id: tui
    ids:
      - tui
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [binary]

checksum:
  name_template: "checksums.txt"

homebrew_casks:
  - name: korean-tui
    ids:
      - tui
    binaries:
      - korean-tui
    repository:
      owner: hilarraz
      name: homebrew-tap
      branch: main
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/arthurblanchet59/korean-learning-go"
    description: "Client terminal pour reviser le coreen (korean-learning-go)"

changelog:
  sort: asc
  filters:
    exclude:
      - "^test:"
      - "^chore:"

release:
  github:
    owner: arthurblanchet59
    name: korean-learning-go
