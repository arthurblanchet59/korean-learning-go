<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Korean Learning</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar" aria-label="Navigation principale">
        <div class="brand">
          <span>KL</span>
          <div>
            <p>Korean Learning</p>
            <strong>Study deck</strong>
          </div>
        </div>

        <nav class="nav-list">
          <a class="nav-item active" href="#">Dashboard</a>
          <a class="nav-item" href="#">Revision</a>
          <a class="nav-item" href="#">Decks</a>
          <a class="nav-item" href="#">Cartes</a>
          <a class="nav-item" href="#">Stats</a>
        </nav>

        <section class="side-panel">
          <span>API</span>
          <strong id="apiStatus">Connexion...</strong>
        </section>
      </aside>

      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Aujourd'hui</p>
            <h1>Revision coréen</h1>
          </div>
          <button class="primary-button" id="startReviewButton">Commencer</button>
        </header>

        <section class="metrics" aria-label="Statistiques du jour">
          <article>
            <span>A reviser</span>
            <strong id="dueCards">--</strong>
          </article>
          <article>
            <span>Nouvelles</span>
            <strong id="newCards">--</strong>
          </article>
          <article>
            <span>Difficiles</span>
            <strong id="difficultCards">--</strong>
          </article>
        </section>

        <section class="study-layout">
          <section class="review-panel" aria-label="Carte de revision">
            <div class="review-header">
              <p class="eyebrow">Carte active</p>
              <span id="cardCounter">0 / 0</span>
            </div>

            <div class="card-face">
              <h2 id="cardKorean">&#50504;&#45397;&#54616;&#49464;&#50836;</h2>
              <p id="cardRomanization">annyeonghaseyo</p>
            </div>

            <div class="answer">
              <span>Traduction</span>
              <strong id="cardTranslation">bonjour</strong>
            </div>

            <p class="example" id="cardExample">
              &#50504;&#45397;&#54616;&#49464;&#50836;, &#51200;&#45716; Arthur&#50696;&#50836;.
            </p>

            <div class="rating-row" aria-label="Notation de la carte">
              <button data-rating="again">Encore</button>
              <button data-rating="hard">Difficile</button>
              <button data-rating="good">Correct</button>
              <button data-rating="easy">Facile</button>
            </div>
          </section>

          <aside class="queue-panel" aria-label="Cartes a reviser">
            <div class="panel-heading">
              <p class="eyebrow">File de revision</p>
              <strong id="queueCount">0 cartes</strong>
            </div>
            <div class="queue-list" id="queueList"></div>
          </aside>
        </section>

        <section class="deck-panel" aria-label="Decks disponibles">
          <div class="panel-heading">
            <p class="eyebrow">Decks</p>
            <strong id="deckCount">0</strong>
          </div>
          <div class="deck-list" id="deckList"></div>
        </section>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
